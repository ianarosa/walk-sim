<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>walk-sim — AI learns to walk</title>
  <style>
    /* ===================================================================
     * Dark theme. The canvas owns the whole screen; the sidebar floats
     * over it (translucent, backdrop-blurred). This is the ONLY UI.
     * =================================================================== */
    :root {
      --bg: #05070c;
      --card-bg: rgba(16, 21, 30, 0.72);
      --card-border: rgba(255, 255, 255, 0.10);
      --text: #e6e9ee;
      --muted: #9aa0a6;
      --accent: #7cc4ff;
      --btn-bg: rgba(255, 255, 255, 0.06);
      --btn-bg-hover: rgba(255, 255, 255, 0.12);
      --btn-active: rgba(124, 196, 255, 0.22);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;              /* full-bleed canvas; nothing scrolls */
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    }

    /* FULLSCREEN simulation canvas — sits behind the UI. */
    canvas#sim {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
      background: var(--bg);
      z-index: 0;
    }

    /* Floating sidebar: translucent dark card, top-left, blurred backdrop. */
    #sidebar {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 10;
      width: 240px;
      padding: 16px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.45);
      display: flex;
      flex-direction: column;
      gap: 12px;
      user-select: none;
    }

    #sidebar h1 {
      margin: 0;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }
    #sidebar h1 span { color: var(--accent); }

    #sidebar .sub {
      margin: -6px 0 2px;
      font-size: 11px;
      color: var(--muted);
      line-height: 1.4;
    }

    .row { display: flex; gap: 8px; }

    button {
      flex: 1 1 0;
      appearance: none;
      cursor: pointer;
      color: var(--text);
      background: var(--btn-bg);
      border: 1px solid var(--card-border);
      border-radius: 9px;
      padding: 9px 10px;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.15s ease, border-color 0.15s ease;
    }
    button:hover { background: var(--btn-bg-hover); }
    button.active { background: var(--btn-active); border-color: var(--accent); }

    .toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 13px;
      color: var(--text);
    }
    .toggle input { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field .label-row {
      display: flex; justify-content: space-between; align-items: baseline;
      font-size: 13px;
    }
    .field .label-row .val { color: var(--accent); font-variant-numeric: tabular-nums; }
    input[type="range"] { width: 100%; accent-color: var(--accent); cursor: pointer; }

    #hud {
      margin-top: 2px;
      padding-top: 10px;
      border-top: 1px solid var(--card-border);
      font-size: 11px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <!-- The simulation is painted here. -->
  <canvas id="sim"></canvas>

  <!-- The floating control sidebar (the only UI). ids are read by controls.js -->
  <aside id="sidebar">
    <h1>walk<span>-sim</span></h1>
    <p class="sub">A biped ragdoll dropped into planck.js physics. No learning yet — just physics, render &amp; controls.</p>

    <div class="row">
      <button id="btn-reset" type="button">Reset</button>
      <button id="btn-pause" type="button">Pause</button>
    </div>

    <label class="toggle">
      <span>Flail joints</span>
      <input id="chk-flail" type="checkbox" />
    </label>

    <div class="field">
      <div class="label-row">
        <label for="slider-speed">Sim speed</label>
        <span class="val" id="val-speed">1x</span>
      </div>
      <input id="slider-speed" type="range" min="1" max="8" step="1" value="1" />
    </div>

    <div id="hud">starting…</div>
  </aside>

  <!-- planck.js (Box2D) as a PLAIN script: exposes window.planck. -->
  <script src="vendor/planck.min.js"></script>
  <!-- Our app as an ES module; reads the planck global. -->
  <script type="module" src="src/main.js"></script>
</body>
</html>
